<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCAA Women's Volleyball — Player Valuation Model</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="US">
  <div class="uc"><h1>🏐 NCAA <span>Volleyball</span></h1><p class="sub">Women's Player Valuation Model</p>
    <div class="chips"><div class="chip">2025 Season</div><div class="chip">Live Google Sheets</div><div class="chip">Per-Set Normalization</div></div>
    <div class="spinner" id="spinner"></div>
    <div class="load-status" id="load-status">Connecting to Google Sheets...</div>
    <div class="load-error" id="load-error"></div>
  </div>
</div>
<div id="DB">
  <div class="topbar"><div class="brand">🏐 NCAA <span>Volleyball</span> <span style="color:var(--t3);font-weight:400;font-size:.65rem">v4</span></div><div class="topbar-r"><div class="pill"><b id="tpc">0</b> Players</div><div class="pill"><b id="ttc">0</b> Teams</div><button class="btn-s" onclick="location.reload()">↻ Refresh</button></div></div>
  <div class="cbar">
    <div class="cg"><label>Position</label><select id="fp"><option value="all">All Positions</option><option value="OH">OH</option><option value="MB">MB</option><option value="S">S</option><option value="L/DS">L/DS</option><option value="OPP">OPP</option></select></div>
    <div class="cg"><label>Tier</label><select id="ft"><option value="all">All</option><option value="Elite">Elite</option><option value="Starter">Starter</option><option value="Rotation">Rotation</option><option value="Bench">Bench</option><option value="Developmental">Dev</option></select></div>
    <div class="cg"><label>Search</label><input type="text" id="fs" placeholder="Player or team..."></div>
  </div>
  <div class="tbar">
    <button class="tbtn active" data-tab="players">Players</button>
    <button class="tbtn" data-tab="positions">Positions</button>
    <button class="tbtn" data-tab="roster">Roster Builder</button>
    <button class="tbtn" data-tab="weights">⚙ Weights</button>
    <button class="tbtn" data-tab="valuation">💰 Valuation</button>
    <button class="tbtn" data-tab="methodology">Methodology</button>
  </div>
  <div id="ostats" class="ogrid"></div>
  <div class="main">
    <div class="tp active" id="p-players"><div class="tw"><div class="thb"><h3>All Players</h3><span class="cnt" id="plc"></span><div style="display:flex;gap:.3rem;align-items:center" id="pgnav"></div></div><div class="tscr" id="plt"></div></div></div>
    <div class="tp" id="p-positions"><div id="pgd"></div></div>
    <div class="tp" id="p-roster"><div id="rz"></div></div>
    <div class="tp" id="p-weights"><div id="wz"></div></div>
    <div class="tp" id="p-valuation"><div id="vz"></div></div>
    <div class="tp" id="p-methodology"><div id="mz"></div></div>
  </div>
</div>
<div class="mo" id="pm"><div class="modal"><button class="mcl" onclick="closeM()">✕</button><div class="mhd" id="mh"></div><div class="cmp-pk" id="cmpPicker"><div class="cmp-pk-ttl">⚔️ Compare with...</div><input id="cmpSearch" type="text" placeholder="Search by name or team..." oninput="filterCmpPicker(this.value)" autocomplete="off"><div class="cmp-pk-res" id="cmpResults"></div></div><div class="mbd" id="mb"></div></div></div>
<div class="mo" id="cm"><div class="modal" style="max-width:960px"><button class="mcl" onclick="closeCM()">✕</button><div class="mhd" id="cmh"></div><div class="mbd" id="cmb"></div></div></div>
<div class="ttpop" id="ttp"><button class="ctt" onclick="closeTT()">✕</button><h5 id="ttt"></h5><p id="ttb"></p></div>

<button class="chat-fab" id="chatFab" onclick="toggleChat()" title="AI Assistant">🤖</button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-hd"><h4>🤖 <span>Scout AI</span></h4><button class="btn-s" onclick="clearChat()" style="font-size:.58rem">Clear</button></div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-quick" id="chatQuick">
    <button class="chat-qb" onclick="sendChat('Analyze my roster and suggest improvements')">Analyze roster</button>
    <button class="chat-qb" onclick="sendChat('Who are the best value players I should target?')">Best value</button>
    <button class="chat-qb" onclick="sendChat('What positions does my team need most?')">Position gaps</button>
    <button class="chat-qb" onclick="sendChat('Build me the best roster under budget')">Auto-build</button>
  </div>
  <div class="chat-inp"><input type="text" id="chatInput" placeholder="Ask about players, strategy, roster..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"><button onclick="sendChat()" id="chatSend">Send</button></div>
</div>

<script src="app.js" defer></script>
</body>
</html>
